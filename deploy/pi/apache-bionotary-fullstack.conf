# Apache vhost for LAN demo:
# - Serves Flutter web app from /home/samyak/bionotary-app/build/web
# - Proxies backend API requests from /api/* to Node on 127.0.0.1:5000

<VirtualHost *:80>
    ServerName _
    ServerAdmin webmaster@localhost

    DocumentRoot /home/samyak/bionotary-app/build/web
    DirectoryIndex index.html

    <Directory /home/samyak/bionotary-app/build/web>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ProxyPreserveHost On
    ProxyPass /api/ http://127.0.0.1:5000/
    ProxyPassReverse /api/ http://127.0.0.1:5000/
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    ErrorLog ${APACHE_LOG_DIR}/bionotary-error.log
    CustomLog ${APACHE_LOG_DIR}/bionotary-access.log combined
</VirtualHost>
