# Copy to /etc/nginx/sites-available/bionotary and symlink to sites-enabled.
# Replace server_name and TLS paths; or use HTTP only on a trusted LAN.

upstream bionotary_api {
    server 127.0.0.1:5000;
}

server {
    listen 80;
    # Replace with your PC LAN IP or local DNS hostname if available.
    server_name _;

    location / {
        proxy_pass http://bionotary_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
