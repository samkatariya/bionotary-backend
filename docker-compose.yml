services:
  postgres:
    image: postgres:16-alpine
    container_name: bionotary-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bionotary
    volumes:
      - bionotary_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bionotary"]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  bionotary_pgdata:
